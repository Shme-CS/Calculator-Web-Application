<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A modern, responsive calculator built with vanilla JavaScript">
    <title>JS Calculator | Modern Web Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Welcome Splash Screen -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-content">
            <div class="splash-icon">🧮</div>
            <h1 class="splash-title">JS Calculator</h1>
            <p class="splash-subtitle">Your Modern Calculation Companion</p>
            <div class="splash-loader">
                <div class="loader-bar"></div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <h1 class="header-title">
                <span class="header-icon">🧮</span>
                JS Calculator
            </h1>
            <p class="header-subtitle">Professional calculation made simple</p>
        </header>

        <div class="calculator">
            <!-- Display Screen -->
            <div class="display">
                <div class="display-previous" id="previousOperand"></div>
                <div class="display-current" id="currentOperand">0</div>
            </div>

            <!-- Calculator Buttons -->
            <div class="buttons">
                <!-- Row 1: Clear and Delete -->
                <button class="btn btn-function span-2" data-action="clear">AC</button>
                <button class="btn btn-function" data-action="delete">DEL</button>
                <button class="btn btn-operator" data-operator="÷">÷</button>

                <!-- Row 2: Numbers 7-9 and Multiply -->
                <button class="btn btn-number" data-number="7">7</button>
                <button class="btn btn-number" data-number="8">8</button>
                <button class="btn btn-number" data-number="9">9</button>
                <button class="btn btn-operator" data-operator="×">×</button>

                <!-- Row 3: Numbers 4-6 and Subtract -->
                <button class="btn btn-number" data-number="4">4</button>
                <button class="btn btn-number" data-number="5">5</button>
                <button class="btn btn-number" data-number="6">6</button>
                <button class="btn btn-operator" data-operator="-">-</button>

                <!-- Row 4: Numbers 1-3 and Add -->
                <button class="btn btn-number" data-number="1">1</button>
                <button class="btn btn-number" data-number="2">2</button>
                <button class="btn btn-number" data-number="3">3</button>
                <button class="btn btn-operator" data-operator="+">+</button>

                <!-- Row 5: Zero, Decimal and Equals -->
                <button class="btn btn-number span-2" data-number="0">0</button>
                <button class="btn btn-number" data-number=".">.</button>
                <button class="btn btn-equals" data-action="equals">=</button>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Built with <span class="heart">♥</span> using Vanilla JavaScript</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
